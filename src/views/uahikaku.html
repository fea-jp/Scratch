<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UserAgent比較</title>
    <style>
        main{display: flex; flex-direction: column; align-items: center;}
        .box{margin: 1em;}
        .container{display: flex; flex-direction: column; align-items: center;}
        button{margin: 0; width: 6rem; height: 2rem; border: none; background-color: #969696; color: black;}
        #user1,#user2{border-width: 1px; border-color: black;}
    </style>
</head>
<body>
    <main>
        <h1>UserAgent比較</h1>
        <p>Scratchのユーザーを指定してやるだけでUAを比較できます</p>
        <div class="container">
            <div style="display: flex;">
                <div class="box">
                    <p>ユーザー1</p>
                    <input type="text" id="user1">
                </div>
                <div class="box">
                    <p>ユーザー2</p>
                    <input type="text" id="user2">
                </div>
            </div>
            <button id="hikaku">比較する</button>
        </div>
    </main>
    <script>
        const user1=document.getElementById("user1");
        const user2=document.getElementById("user2");
        const hikakuButton=document.getElementById("hikaku");
        const container=document.querySelector(".container");
        user1.addEventListener("input",checkUser);
        user2.addEventListener("input",checkUser);
        let timeout=null;
        let flag=false;
        function checkUser(){
            if(user1.value&&user2.value){
                hikakuButton.style.backgroundColor="#969696";
                flag=false;
                if(timeout)clearTimeout(timeout);
                timeout=setTimeout(async()=>{
                    try{
                        const res1=await fetch(`/api/users/${user1.value}`);
                        const res2=await fetch(`/api/users/${user2.value}`);
                        user1.style.borderColor="black";
                        user2.style.borderColor="black";
                        if(!(res1.status==200&&res2.status==200)){
                            if(res1.status!=200)user1.style.borderColor="red";
                            if(res2.status!=200)user2.style.borderColor="red";
                            throw new Error("ユーザーが存在しません");
                        }
                        hikakuButton.style.backgroundColor="#46e80c";
                        flag=true;
                    }catch(e){
                        hikakuButton.style.backgroundColor="#969696";
                        flag=false;
                    }
                },1000)
            }else {
                if(timeout)clearTimeout(timeout);
                hikakuButton.style.backgroundColor="#969696";
                flag=false;
            }
        }
        hikakuButton.addEventListener("click",async()=>{
            if(flag){
                try{
                    container.innerHTML=`<h2>処理中・・・</h2>`;
                    const ua1=await getUserAgent(user1.value);
                    const ua2=await getUserAgent(user2.value);
                    container.innerHTML=`<h2>${(ua1==ua2)?"一致":"不一致"}</h2>
                    <p>${ua1}<br>${ua2}</p>`;
                }catch(e){}
            };
        });
        async function getUserAgent(username){
            try{
                const res=await fetch(`/api/users/${username}/ua`);
                const data=await res.json();
                return data.agent;
            }catch(e){}
        }
    </script>
</body>
</html>
